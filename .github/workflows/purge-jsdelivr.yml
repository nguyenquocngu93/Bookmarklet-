name: Purge jsDelivr cache

# Tự động purge cache jsDelivr sau mỗi push lên main
# để URL @main luôn phục vụ bản mới nhất (tránh chờ 12h cache branch).
#
# Chiến lược:
# - Dùng GET https://purge.jsdelivr.net/gh/<owner>/<repo>@main/<file>
#   (endpoint tolerant hơn POST API, không đòi semver, hoạt động cho branch).
# - Purge từng file song song bằng xargs, không fail toàn workflow nếu 1 file lỗi.
# - Chỉ log warning cho file lỗi lẻ (ví dụ file mới toanh chưa từng được cache).

on:
  push:
    branches: [main]
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.css'
  workflow_dispatch:

concurrency:
  group: purge-jsdelivr
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Xác định danh sách file cần purge
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mapfile -t FILES < <(git ls-files '*.js' '*.html' '*.css')
          else
            BEFORE="${{ github.event.before }}"
            # Nếu before là 000... (push đầu tiên/force push) thì diff với HEAD~1
            if [[ "$BEFORE" =~ ^0+$ ]]; then
              BEFORE="HEAD~1"
            fi
            mapfile -t FILES < <(
              git diff --name-only --diff-filter=AMR "$BEFORE" "${{ github.sha }}" \
                -- '*.js' '*.html' '*.css' 2>/dev/null || true
            )
          fi

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "Không có file nào cần purge."
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Sẽ purge ${#FILES[@]} file:"
          printf '  - %s\n' "${FILES[@]}"
          printf '%s\n' "${FILES[@]}" > files.txt
          echo "count=${#FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: Purge từng file (GET endpoint)
        if: steps.files.outputs.count != '0'
        shell: bash
        run: |
          set -uo pipefail
          REPO="${{ github.repository }}"
          OK=0
          FAIL=0
          SKIP=0

          purge_one() {
            local file="$1"
            local url="https://purge.jsdelivr.net/gh/${REPO}@main/${file}"
            local resp
            local code
            resp=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -m 30 "$url" 2>&1 || true)
            code=$(echo "$resp" | grep -oE 'HTTP_CODE:[0-9]+' | tail -1 | cut -d: -f2)
            body=$(echo "$resp" | sed '/^HTTP_CODE:/d')

            case "$code" in
              200)
                echo "✅ [$code] $file"
                echo "OK"
                ;;
              404)
                # File chưa từng được cache → không có gì để purge, coi như skip
                echo "⚠️  [$code] $file (chưa cache, bỏ qua)"
                echo "SKIP"
                ;;
              429)
                echo "⏳ [$code] $file (rate-limited)"
                echo "FAIL"
                ;;
              *)
                echo "❌ [$code] $file"
                echo "   Response: $(echo "$body" | head -c 300)"
                echo "FAIL"
                ;;
            esac
          }
          export -f purge_one
          export REPO

          # Chạy tuần tự (an toàn với rate limit) — với repo nhỏ vẫn nhanh
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            result=$(purge_one "$file" | tail -1)
            case "$result" in
              OK)   OK=$((OK+1)) ;;
              SKIP) SKIP=$((SKIP+1)) ;;
              *)    FAIL=$((FAIL+1)) ;;
            esac
            # tránh spam API
            sleep 0.3
          done < files.txt

          echo ""
          echo "===== KẾT QUẢ ====="
          echo "✅ Purge OK: $OK"
          echo "⚠️  Skip (chưa cache): $SKIP"
          echo "❌ Fail: $FAIL"

          if [ "$OK" -gt 0 ] || [ "$SKIP" -gt 0 ]; then
            echo "::notice::Purged $OK file, skipped $SKIP file, failed $FAIL file"
          fi

          # Chỉ fail workflow nếu KHÔNG có file nào purge/skip được (tức toàn bộ đều lỗi)
          if [ "$OK" -eq 0 ] && [ "$SKIP" -eq 0 ] && [ "$FAIL" -gt 0 ]; then
            echo "::error::Toàn bộ purge request đều thất bại"
            exit 1
          fi
