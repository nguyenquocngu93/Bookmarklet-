<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UMP DL – Player Preview</title>
<style>
  :root {
    --pink: #ff2fc8;
    --purple: #9b3dff;
    --text: #2b1836;
    --border: rgba(255, 47, 200, .22);
    --shadow: 8px 12px 28px rgba(43, 24, 54, .4), 2px 3px 8px rgba(43, 24, 54, .25);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #222;
  }
  .player-sheet {
    width: min(100%, 720px);
    height: min(92vh, 850px);
    min-height: 540px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 32px 32px 0 0;
    background: rgba(255, 250, 253, .82);
    box-shadow: 0 -20px 50px rgba(0, 0, 0, .8);
    backdrop-filter: blur(4px) saturate(130%);
  }
  header {
    height: 92px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  button {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--purple);
    background: rgba(255, 47, 200, .1);
    font-size: 25px;
  }
  .video-area {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background:
      radial-gradient(circle at 18% 18%, rgba(255,47,200,.14), transparent 38%),
      radial-gradient(circle at 84% 78%, rgba(155,61,255,.12), transparent 42%),
      linear-gradient(135deg, rgba(255,238,249,.96), rgba(245,232,255,.96));
  }
  .video-frame {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 16px;
    background: transparent;
    box-shadow: var(--shadow);
  }
  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    background: transparent;
  }
  .info {
    flex: 0 0 auto;
    padding: 16px 28px 22px;
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,47,200,.05), rgba(155,61,255,.03));
  }
  .title { font-size: 19px; font-weight: 700; }
  .meta {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--purple);
    background: rgba(255, 47, 200, .1);
  }
  .note { margin: 10px 0 0; color: #7c6a8f; font-size: 12px; }
  @media (max-width: 520px) {
    body { padding: 0; }
    .player-sheet { width: 100%; height: 100vh; border-radius: 32px 32px 0 0; }
    header { height: 88px; padding: 18px 28px; }
    .video-area { padding: 0; }
    .video-frame { width: 100%; height: 100%; }
  }
</style>
</head>
<body>
  <main class="player-sheet">
    <header>
      <button aria-label="Đóng">←</button>
      <button aria-label="Tuỳ chọn">⋮</button>
    </header>
    <section class="video-area">
      <div class="video-frame">
        <video controls autoplay muted loop playsinline
          poster="https://dummyimage.com/1280x720/f3dff0/8d4f9b.png&text=Video+preview">
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
          Trình duyệt không hỗ trợ video.
        </video>
      </div>
    </section>
    <section class="info">
      <div class="title">▶ Asian Sugar Cookie EPORNER</div>
      <div class="meta">M3U8 · 860 × 480 · ≈ 150.1 MB</div>
      <p class="note">Preview: nền hồng, video bo góc 16px và đổ bóng.</p>
    </section>
  </main>
</body>
</html>
